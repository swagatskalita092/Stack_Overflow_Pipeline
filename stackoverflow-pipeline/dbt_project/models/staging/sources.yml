version: 2
sources:
  - name: raw
    schema: raw
    description: "Raw landing zone for Stack Overflow Developer Survey 2024"
    tables:
      - name: survey_responses
        description: "65,000+ raw survey responses loaded by the ingestion script"
        columns:
          - name: response_id
            description: "Unique identifier per survey response"
            tests:
              - not_null
