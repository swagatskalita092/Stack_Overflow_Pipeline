version: 2

models:
  - name: stg_survey_responses
    description: "Staged and deduplicated Stack Overflow Developer Survey 2024 responses. One row per unique ResponseId."
    columns:
      - name: response_id
        tests:
          - unique
          - not_null
      - name: country
        description: "Developer country of residence"
      - name: comp_total_usd
        description: "Total annual compensation in USD, cleaned numeric"
      - name: years_code_pro
        description: "Professional coding experience in years"

  - name: int_languages_exploded
    description: "One row per (response_id, language). Includes wants_to_continue flag."
    columns:
      - name: response_id
        tests:
          - not_null
      - name: language
        tests:
          - not_null
      - name: wants_to_continue
        tests:
          - accepted_values:
              values: [true, false]

  - name: int_databases_exploded
    description: "One row per (response_id, database_name)."
    columns:
      - name: response_id
        tests:
          - not_null
      - name: database_name
        tests:
          - not_null

  - name: mart_salary_analytics
    description: "Salary analytics aggregated by country, experience band, developer type, remote work, and org size."
    columns:
      - name: respondent_count
        tests:
          - not_null
      - name: median_salary_usd
        description: "Median annual salary in USD for this segment"

  - name: mart_tech_adoption
    description: "Technology adoption and retention rates for programming languages and databases."
    columns:
      - name: tech_name
        tests:
          - not_null
      - name: tech_type
        tests:
          - not_null
          - accepted_values:
              values: ['Language', 'Database']

  - name: mart_ai_sentiment
    description: "Developer sentiment toward AI tools by country and role."
    columns:
      - name: respondent_count
        tests:
          - not_null
